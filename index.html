
<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto & Image Classifier</title>
  <link href='/style.css' rel='stylesheet'>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>AI Image Classifier</h1>
      <button id="theme-toggle" aria-label="Toggle dark/light mode">
        <span class="icon">🌙</span>
      </button>
    </header>
    <main>
      <section class="classifier-section">
        <h2>붉은사막 vs 음식 판독기</h2>
        <div class="classifier-controls">
          <button type="button" id="start-webcam-btn">웹캠 시작</button>
          <div class="upload-btn-wrapper">
            <button class="btn">이미지 업로드</button>
            <input type="file" id="image-input" accept="image/*" />
          </div>
        </div>

        <div id="media-container">
          <div id="webcam-container"></div>
          <img id="image-preview" style="display:none;" />
        </div>

        <div id="label-container"></div>
      </section>

      <hr class="separator">

      <section class="lotto-section">
        <h2>Lotto Number Generator</h2>
        <div class="numbers-display"></div>
        <button id="generate-btn">Generate Numbers</button>
      </section>

      <section class="contact-section">
...

        <h2>제휴 및 문의</h2>
        <form action="https://formspree.io/f/mojblpqd" method="POST" id="contact-form">
          <div class="form-group">
            <input type="text" name="name" placeholder="성함/기업명" required>
          </div>
          <div class="form-group">
            <input type="email" name="email" placeholder="이메일 주소" required>
          </div>
          <div class="form-group">
            <textarea name="message" placeholder="문의 내용을 입력해주세요" rows="4" required></textarea>
          </div>
          <button type="submit" id="form-submit-btn">문의 보내기</button>
        </form>
        <div id="form-status"></div>
      </section>

      <section class="comment-section">
        <hr class="separator">
        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
      </section>

    </main>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
